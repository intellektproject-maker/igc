name: igc
description: "IGC Innovative Genius Council"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # -------------------------------
  # State Management
  # -------------------------------
  flutter_riverpod: ^2.6.1

  # -------------------------------
  # Navigation
  # -------------------------------
  go_router: ^16.0.0

  # -------------------------------
  # Networking
  # -------------------------------
  dio: ^5.9.0

  # -------------------------------
  # Secure Storage
  # -------------------------------
  flutter_secure_storage: ^9.2.4

  # -------------------------------
  # Local Storage
  # -------------------------------
  shared_preferences: ^2.5.3

  # -------------------------------
  # SVG Support
  # -------------------------------
  flutter_svg: ^2.2.1

  # -------------------------------
  # Cached Images
  # -------------------------------
  cached_network_image: ^3.4.1

  # -------------------------------
  # Google Fonts
  # -------------------------------
  google_fonts: ^6.3.2

  # -------------------------------
  # Date & Time
  # -------------------------------
  intl: ^0.20.2

  # -------------------------------
  # Internet Connectivity
  # -------------------------------
  connectivity_plus: ^7.0.0

  # -------------------------------
  # Permissions
  # -------------------------------
  permission_handler: ^12.0.1

  # -------------------------------
  # Image Picker
  # -------------------------------
  image_picker: ^1.2.0

  # -------------------------------
  # File Picker
  # -------------------------------
  file_picker: ^10.3.2

  # -------------------------------
  # Loading Animation
  # -------------------------------
  flutter_spinkit: ^5.2.1

  # -------------------------------
  # Shimmer Effect
  # -------------------------------
  shimmer: ^3.0.0

  # -------------------------------
  # UUID Generator
  # -------------------------------
  uuid: ^4.5.1

  # -------------------------------
  # Logger
  # -------------------------------
  logger: ^2.6.1

  fl_chart: ^0.70.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/
    - assets/animations/